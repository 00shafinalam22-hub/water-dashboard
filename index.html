<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AquaWatch Pro — Cyber Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --neon-blue: #00f2ff;
  --neon-purple: #bc13fe;
  --glass: rgba(255, 255, 255, 0.03);
  --glass-border: rgba(255, 255, 255, 0.1);
  --bg: #050a10;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }

body {
  background: var(--bg);
  color: #fff;
  overflow-x: hidden;
  min-height: 100vh;
}

/* --- Animated Water Waves --- */
.ocean { 
  height: 5%; width: 100%; position: fixed; bottom: 0; left: 0; background: #015871; opacity: 0.5; z-index: -1;
}
.wave {
  background: url(https://s3-us-west-2.amazonaws.com/s.cdpn.io/85486/wave.svg) repeat-x; 
  position: absolute; top: -198px; width: 6400px; height: 198px; animation: wave 7s cubic-bezier( 0.36, 0.45, 0.63, 0.53) infinite; transform: translate3d(0, 0, 0);
}
@keyframes wave { 0% { margin-left: 0; } 100% { margin-left: -1600px; } }

/* --- Layout --- */
.container { padding: 20px; max-width: 1200px; margin: auto; }

header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 0; border-bottom: 1px solid var(--glass-border); margin-bottom: 30px;
}

h1 { font-family: 'Orbitron'; font-size: 1.5rem; letter-spacing: 2px; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

/* --- Dataset Controls --- */
.controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
select, button {
  background: var(--glass); border: 1px solid var(--glass-border); color: #fff;
  padding: 10px 20px; border-radius: 8px; cursor: pointer; backdrop-filter: blur(10px);
}
button:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 15px var(--neon-blue); }

/* --- Metrics Grid --- */
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
.card {
  background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px;
  padding: 25px; backdrop-filter: blur(20px); position: relative; transition: 0.3s;
}
.card:hover { border-color: var(--neon-blue); transform: translateY(-5px); }
.card h3 { font-size: 0.9rem; text-transform: uppercase; color: #aaa; margin-bottom: 10px; }
.card .value { font-family: 'Orbitron'; font-size: 2rem; color: #fff; }
.card .unit { font-size: 0.8rem; color: var(--neon-blue); margin-left: 5px; }

/* --- Chart Section --- */
.chart-container {
  background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px;
  padding: 20px; backdrop-filter: blur(20px); margin-bottom: 30px; height: 400px;
}

/* --- Status Badge --- */
.status-badge {
  padding: 5px 15px; border-radius: 20px; font-weight: bold; text-transform: uppercase; font-size: 0.8rem;
}
.safe { background: rgba(0, 255, 136, 0.2); color: #00ff88; border: 1px solid #00ff88; }
.danger { background: rgba(255, 0, 85, 0.2); color: #ff0055; border: 1px solid #ff0055; }

</style>
</head>
<body>

<div class="ocean"><div class="wave"></div></div>

<div class="container">
  <header>
    <h1>AQUAWATCH <span style="font-weight:300">PRO</span></h1>
    <div id="healthStatus" class="status-badge safe">System Online</div>
  </header>

  <div class="controls">
    <select id="dsSelect" onchange="loadData(this.value)"><option>Loading Sessions...</option></select>
    <button onclick="fetchDatasets()">🔄 Refresh</button>
    <button onclick="downloadCSV()">📥 Export CSV</button>
  </div>

  <div class="grid">
    <div class="card">
      <h3>Temperature</h3>
      <div class="value" id="valTemp">--</div><span class="unit">°C</span>
    </div>
    <div class="card">
      <h3>TDS Level</h3>
      <div class="value" id="valTDS">--</div><span class="unit">ppm</span>
    </div>
    <div class="card">
      <h3>pH Level</h3>
      <div class="value" id="valPH">--</div><span class="unit">pH</span>
    </div>
    <div class="card">
      <h3>Oxygen (DO)</h3>
      <div class="value" id="valDO">--</div><span class="unit">mg/L</span>
    </div>
  </div>

  <div class="chart-container">
    <canvas id="mainChart"></canvas>
  </div>
</div>

<script>
const API = "https://water-api-5vhg.onrender.com";
let chart;

// --- Initialize Chart ---
function initChart() {
  const ctx = document.getElementById('mainChart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        label: 'TDS (ppm)',
        borderColor: '#00f2ff',
        backgroundColor: 'rgba(0, 242, 255, 0.1)',
        data: [],
        fill: true,
        tension: 0.4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#aaa' } },
        x: { grid: { display: false }, ticks: { color: '#aaa' } }
      },
      plugins: { legend: { labels: { color: '#fff', font: { family: 'Rajdhani' } } } }
    }
  });
}

// --- Fetch Data ---
async function fetchDatasets() {
  const res = await fetch(`${API}/datasets`);
  const data = await res.json();
  const select = document.getElementById('dsSelect');
  select.innerHTML = data.map(d => `<option value="${d._id}">${d.name}</option>`).join('');
  if(data.length > 0) loadData(data._id);
}

async function loadData(id) {
  const res = await fetch(`${API}/datasets/${id}/data`);
  const readings = await res.json();
  if(!readings.length) return;

  const latest = readings;
  document.getElementById('valTemp').innerText = latest.temp || '--';
  document.getElementById('valTDS').innerText = latest.tds || '--';
  document.getElementById('valPH').innerText = latest.ph || '--';
  document.getElementById('valDO').innerText = latest.do || '--';

  // Update Status
  const status = document.getElementById('healthStatus');
  if(latest.ph < 6.5 || latest.ph > 8.5) {
    status.innerText = "Unsafe Water";
    status.className = "status-badge danger";
  } else {
    status.innerText = "Water Quality Good";
    status.className = "status-badge safe";
  }

  // Update Chart
  const history = readings.slice(0, 20).reverse();
  chart.data.labels = history.map(r => new Date(r.time).toLocaleTimeString());
  chart.data.datasets.data = history.map(r => r.tds);
  chart.update();
}

function downloadCSV() {
  // Add CSV logic here
  alert("Generating CSV...");
}

// Boot
initChart();
fetchDatasets();
setInterval(() => {
  const id = document.getElementById('dsSelect').value;
  if(id) loadData(id);
}, 5000);

</script>
</body>
</html>
